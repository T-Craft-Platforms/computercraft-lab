<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>History</title>
    <style>
      h1 {
        color: yellow;
        margin-top: 0;
        margin-bottom: 1em;
      }

      h2,
      h3 {
        color: orange;
        margin-top: 1em;
        margin-bottom: 0;
      }

      p {
        margin-top: 0;
        margin-bottom: 1em;
      }

      code,
      pre {
        background-color: gray;
        color: white;
      }

      a {
        color: lightblue;
      }
    </style>
  </head>
  <body>
    <h1>{{APP_ICON}} {{APP_TITLE}} History</h1>
    <p>Version: <code>{{APP_VERSION}}</code></p>
    <p><code>{{CURRENT_URL}}</code></p>

    <h2>Status</h2>
    <p><code>{{STATUS_MESSAGE}}</code></p>
    <p>{{HISTORY_HINT}}</p>
    <p>Total entries: <code>{{HISTORY_COUNT}}</code></p>

    <h2>Actions</h2>
    <p><a href="{{CLEAR_ALL_URL}}">Delete all history</a></p>
    <p><a href="about:settings">Settings</a> | <a href="about:home">Home</a></p>

    <h2>Entries (chronological)</h2>
    {{HISTORY_GROUPS}}
  </body>
</html>
