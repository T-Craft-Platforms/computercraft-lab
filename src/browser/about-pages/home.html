<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Home</title>
    <style>
      body {
        color: white;
        background-color: black;
      }

      h1 {
        color: yellow;
        margin-top: 0;
        margin-bottom: 1em;
      }

      h2 {
        color: orange;
        margin-top: 1em;
        margin-bottom: 0;
      }

      p {
        margin-top: 0;
        margin-bottom: 1em;
      }

      code,
      pre {
        background-color: gray;
        color: white;
      }

      a {
        color: lightblue;
      }
    </style>
  </head>
  <body>
    <h1>{{APP_ICON}} {{APP_TITLE}} Home</h1>
    <p>Version: <code>{{APP_VERSION}}</code></p>
    <p><code>{{CURRENT_URL}}</code></p>

    <h2>Time</h2>
    <ul>
      <li>Minecraft: <code>{{MINECRAFT_TIME}}</code></li>
      <li>Real life: <code>{{REAL_TIME}}</code></li>
    </ul>

    <h2>Favorites (<code>{{FAVORITES_COUNT}}</code>)</h2>
    <ul>
      {{FAVORITES_LIST}}
    </ul>

    <p><a href="about:favorites">Open favorites page</a> | <a href="about:settings">Settings</a> | <a href="about:help">Help</a></p>
  </body>
</html>
